name: Assign Sprint on Status Change

on:
  projects_v2_item:
    types: [edited]

jobs:
  assign-sprint:
    runs-on: ubuntu-latest
    if: ${{ github.event.changes.field_value.field_type == 'single_select' }}
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: 3056973
          private-key: ${{ secrets.PROJECT_AUTOMATION_APP_KEY }}
          owner: Island-Exterior-Fabricators

      - name: Assign sprint if non-backlog and unset
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ITEM_NODE_ID: ${{ github.event.projects_v2_item.node_id }}
          CHANGED_FIELD_ID: ${{ github.event.changes.field_value.field_node_id }}
        run: |
          set -euo pipefail

          ORG="Island-Exterior-Fabricators"
          PROJECT_NUMBER=1

          # ── Fetch project metadata ───────────────────────────────────────
          PROJECT_DATA=$(gh api graphql -f query='
            query($org: String!, $number: Int!) {
              organization(login: $org) {
                projectV2(number: $number) {
                  id
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id name
                        options { id name }
                      }
                      ... on ProjectV2IterationField {
                        id name
                        configuration {
                          iterations {
                            id title startDate duration
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          ' -F org="$ORG" -F number="$PROJECT_NUMBER")

          PROJECT_ID=$(echo "$PROJECT_DATA" | \
            jq -r '.data.organization.projectV2.id')

          STATUS_FIELD_ID=$(echo "$PROJECT_DATA" | jq -r '
            .data.organization.projectV2.fields.nodes[]
            | select(.name == "Status") | .id')

          SPRINT_FIELD_ID=$(echo "$PROJECT_DATA" | jq -r '
            .data.organization.projectV2.fields.nodes[]
            | select(.name == "Sprint") | .id')

          # Only proceed if the changed field is Status
          if [[ "$CHANGED_FIELD_ID" != "$STATUS_FIELD_ID" ]]; then
            echo "Changed field is not Status, skipping"
            exit 0
          fi

          # Query the item's current status value
          CURRENT_STATUS=$(gh api graphql -f query='
            query($itemId: ID!) {
              node(id: $itemId) {
                ... on ProjectV2Item {
                  fieldValueByName(name: "Status") {
                    ... on ProjectV2ItemFieldSingleSelectValue {
                      name
                    }
                  }
                }
              }
            }
          ' -F itemId="$ITEM_NODE_ID" \
          | jq -r '.data.node.fieldValueByName.name // ""')

          echo "Current status: $CURRENT_STATUS"

          if [[ "$CURRENT_STATUS" == "Backlog" || -z "$CURRENT_STATUS" ]]; then
            echo "Status is Backlog or unset, skipping"
            exit 0
          fi

          # Check if sprint is already assigned
          CURRENT_SPRINT=$(gh api graphql -f query='
            query($itemId: ID!) {
              node(id: $itemId) {
                ... on ProjectV2Item {
                  fieldValueByName(name: "Sprint") {
                    ... on ProjectV2ItemFieldIterationValue {
                      title
                    }
                  }
                }
              }
            }
          ' -F itemId="$ITEM_NODE_ID" \
          | jq -r '.data.node.fieldValueByName.title // ""')

          if [[ -n "$CURRENT_SPRINT" ]]; then
            echo "Sprint already set to: $CURRENT_SPRINT, skipping"
            exit 0
          fi

          # Find current iteration
          TODAY=$(date -u +%Y-%m-%d)
          CURRENT_ITERATION_ID=""
          while IFS= read -r iter; do
            START=$(echo    "$iter" | jq -r '.startDate')
            DURATION=$(echo "$iter" | jq -r '.duration')
            ITER_ID=$(echo  "$iter" | jq -r '.id')
            END=$(date -u -d "$START + $DURATION days" +%Y-%m-%d)
            if [[ ! "$TODAY" < "$START" && "$TODAY" < "$END" ]]; then
              CURRENT_ITERATION_ID="$ITER_ID"
              break
            fi
          done < <(echo "$PROJECT_DATA" | jq -c '
            .data.organization.projectV2.fields.nodes[]
            | select(.name == "Sprint")
            | .configuration.iterations[]')

          if [[ -z "$CURRENT_ITERATION_ID" ]]; then
            echo "Warning: no active sprint found"
            exit 0
          fi

          # Set sprint on the item
          gh api graphql -f query='
            mutation(
              $projectId: ID!, $itemId: ID!,
              $fieldId: ID!, $iterationId: String!
            ) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $projectId
                itemId: $itemId
                fieldId: $fieldId
                value: { iterationId: $iterationId }
              }) { projectV2Item { id } }
            }
          ' -F projectId="$PROJECT_ID" \
            -F itemId="$ITEM_NODE_ID" \
            -F fieldId="$SPRINT_FIELD_ID" \
            -F iterationId="$CURRENT_ITERATION_ID" \
          > /dev/null

          echo "Sprint assigned to current iteration"
